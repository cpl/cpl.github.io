<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italian Cheatsheet</title>
<style>
  :root{
    --bg:#faf7f2; --card:#ffffff; --ink:#22201d; --muted:#8a8178;
    --line:#e7e0d6; --accent:#1a7a4c; --accent-d:#15623d;
    --green:#0a7d3f; --green-bg:#e7f5ec; --blue:#0e6b8f; --blue-bg:#e6f1f6;
    --amber:#b06a00; --amber-bg:#fbf0dd;
    --it-green:#009246; --it-red:#ce2b37;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 18px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;-webkit-font-smoothing:antialiased}
  header{padding:26px 20px 12px;text-align:center}
  .flag{display:inline-block;width:44px;height:29px;border-radius:4px;overflow:hidden;
    vertical-align:middle;margin-right:10px;box-shadow:var(--shadow)}
  .flag i{display:inline-block;width:33.34%;height:100%;float:left}
  .flag .g{background:var(--it-green)} .flag .w{background:#fff} .flag .r{background:var(--it-red)}
  h1{font-size:1.65rem;margin:.1em 0;display:inline-block;vertical-align:middle}
  .sub{color:var(--muted);font-size:.9rem;margin:6px auto 0;max-width:680px}

  /* section nav */
  .nav{position:sticky;top:0;z-index:30;background:rgba(250,247,242,.94);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    display:flex;gap:6px;overflow-x:auto;padding:10px 14px;scrollbar-width:thin}
  .nav::-webkit-scrollbar{height:6px}
  .nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  .nav-btn{flex:0 0 auto;padding:9px 14px;border:1px solid var(--line);background:#fff;
    border-radius:999px;font-size:.84rem;cursor:pointer;color:var(--ink);
    transition:.12s;white-space:nowrap;font-weight:500}
  .nav-btn:hover{border-color:var(--accent)}
  .nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 70px}
  .section-head{margin:4px 0 16px}
  .section-head h2{margin:0 0 4px;font-size:1.35rem}
  .section-head p{margin:0;color:var(--muted);font-size:.9rem;max-width:760px}

  /* verb controls */
  .vctl{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 16px}
  #search{flex:1 1 220px;max-width:320px;padding:10px 14px;border:1px solid var(--line);
    border-radius:10px;font-size:.95rem;background:#fff;color:var(--ink)}
  #search:focus{outline:2px solid var(--accent);border-color:transparent}
  .tenses{display:flex;flex-wrap:wrap;gap:6px}
  .tense-btn{padding:7px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;
    font-size:.8rem;cursor:pointer;color:var(--ink);transition:.12s;white-space:nowrap}
  .tense-btn:hover{border-color:var(--accent)}
  .tense-btn.active{background:var(--accent-d);color:#fff;border-color:var(--accent-d)}

  /* grids & cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden}
  .card h3{margin:0;padding:13px 16px 11px;display:flex;align-items:baseline;
    gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .verb{font-size:1.2rem;font-weight:700}
  .gloss{color:var(--muted);font-size:.88rem;font-style:italic}
  .badges{margin-left:auto;display:flex;gap:6px}
  .badge{font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 7px;border-radius:6px;font-weight:600}
  .b-avere{background:var(--blue-bg);color:var(--blue)}
  .b-essere{background:var(--green-bg);color:var(--green)}
  .b-reg{background:#f0ece4;color:var(--muted)}
  .tense-label{padding:9px 16px;font-size:.72rem;text-transform:uppercase;
    letter-spacing:.06em;color:var(--accent);font-weight:700;background:#f7f3ec}

  table{width:100%;border-collapse:collapse;font-size:.92rem}
  td,th{padding:7px 14px;border-top:1px solid #f1ece4;text-align:left;vertical-align:top}
  tr:first-child td{border-top:none}
  thead th{background:#f7f3ec;border-top:none;font-size:.72rem;text-transform:uppercase;
    letter-spacing:.05em;color:var(--accent);font-weight:700;position:sticky}
  .pron{color:var(--muted);width:34%;white-space:nowrap}
  .form{font-weight:600}
  .agr{color:var(--it-red);font-weight:600}
  .it{font-weight:600;color:var(--accent-d)}
  .en{color:#4a463f}
  .note{color:var(--muted);font-size:.85rem}

  /* full-width table block */
  .tblcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .tblcard .cap{padding:13px 16px;font-weight:700;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .tblcard .cap small{font-weight:400;color:var(--muted);font-style:italic}
  .scroll{overflow-x:auto}
  .pairtbl td:first-child{white-space:nowrap}
  .matrix td,.matrix th{white-space:nowrap}
  .matrix thead th:first-child,.matrix tbody td:first-child{
    position:sticky;left:0;background:#fff;z-index:1}
  .matrix thead th:first-child{background:#f7f3ec;z-index:2}
  .matrix tbody td:first-child{font-weight:600}

  .tip{background:var(--amber-bg);border:1px solid #f0dcb8;color:#5c4310;
    border-radius:10px;padding:6px 11px;font-size:.85rem;margin:2px 0}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}}
  @media(max-width:520px){.grid{grid-template-columns:1fr} td,th{padding:7px 11px}}
  .noresult{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px}
  footer{text-align:center;color:var(--muted);font-size:.8rem;padding:10px 0 40px}
  code{background:#f3efe7;padding:1px 6px;border-radius:5px;font-size:.85em;
    color:var(--it-red);font-weight:600}
</style>
</head>
<body>
<header>
  <span class="flag"><i class="g"></i><i class="w"></i><i class="r"></i></span>
  <h1>Italian Cheatsheet</h1>
  <p class="sub">A learner's quick-reference: verbs, tricky adverbs, countries, easily-confused pairs, numbers, pronouns, and everyday vocabulary.</p>
</header>

<nav class="nav" id="nav"></nav>
<div class="wrap" id="wrap"></div>
<footer>Gender/number agreement everywhere follows the <code>-o/-a/-i/-e</code> pattern. Forms shown in <span class="agr">red</span> change with the subject.</footer>

function head(t,d){return `<div class="section-head"><h2>${t}</h2><p>${d}</p></div>`;}

// generic 2-col table card
function tbl2(cap,sub,rows,h1,h2){
  return `<div class="tblcard"><div class="cap">${cap}${sub?` <small>${sub}</small>`:""}</div>
    <div class="scroll"><table><thead><tr><th>${h1}</th><th>${h2}</th></tr></thead><tbody>${
    rows.map(r=>`<tr><td class="it">${r[0]}</td><td class="en">${r[1]}</td></tr>`).join("")
  }</tbody></table></div></div>`;
}

function draw(){ wrap.innerHTML=""; SECTIONS.find(s=>s.id===active).render(); }

/* ---- verbs ---- */
function renderVerbs(){
  wrap.innerHTML = head("Verbs","All 20 verbs, each as a full table: persons (rows) × six core tenses (columns). Filter below to narrow the list. Verbs with <b>essere</b> agree in gender/number on the participle (<span class='agr'>red</span>).")
   + `<div class="vctl">
        <input id="search" type="search" placeholder="Filter verbs…" autocomplete="off" value="${verbQuery}">
      </div>
      <div id="vtables"></div>`;
  const si=document.getElementById("search");
  si.addEventListener("input",()=>{verbQuery=si.value;drawVerbTables();});
  drawVerbTables();
}
function cellPP(verb,i){
  const form=pp(verb.part,verb.aux,i);
  return verb.aux==="essere"?form.replace(/(\S+)$/,'<span class="agr">$1</span>'):form;
}
const VCOLS=[["Presente","Presente"],["Passato prossimo","Pass. prossimo"],["Imperfetto","Imperfetto"],
 ["Futuro semplice","Futuro"],["Condizionale","Condizionale"],["Imperativo","Imperativo"]];
function verbTableHTML(v){
  const badge=v.reg?`<span class="badge b-reg">${v.reg}</span>`:"";
  const aux=`<span class="badge b-${v.aux}">aux: ${v.aux}</span>`;
  const rows=PRON.map((p,i)=>{
    const tds=VCOLS.map(c=>{
      const val=c[0]==="Passato prossimo"?cellPP(v,i):v[c[0]][i];
      return `<td class="form">${val}</td>`;
    }).join("");
    return `<tr><td class="pron">${p}</td>${tds}</tr>`;
  }).join("");
  return `<div class="tblcard">
     <div class="cap"><span class="verb">${v.v}</span> <small>${v.g}</small>
       <span class="badges">${badge}${aux}</span></div>
     <div class="scroll"><table class="matrix"><thead><tr><th>Person</th>${
       VCOLS.map(c=>`<th>${c[1]}</th>`).join("")
     }</tr></thead><tbody>${rows}</tbody></table></div>
   </div>`;
}
function drawVerbTables(){
  const q=verbQuery.trim().toLowerCase();
  const list=VERBS.filter(v=>!q||v.v.toLowerCase().includes(q)||v.g.toLowerCase().includes(q));
  const c=document.getElementById("vtables");
  if(!list.length){c.innerHTML='<div class="noresult">No verb matches “'+q+'”.</div>';return;}
  c.innerHTML=list.map(verbTableHTML).join("");
}
